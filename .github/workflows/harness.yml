name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint · typecheck · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check voiceshield tests scripts

      - name: Format check (ruff format)
        run: uv run ruff format --check voiceshield tests scripts

      - name: Type check (mypy)
        run: uv run mypy voiceshield --ignore-missing-imports

      - name: Unit tests
        run: uv run pytest tests/unit -q --tb=short

      - name: Integration tests
        run: uv run pytest tests/integration -q --tb=short

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Interface

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Interface/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
